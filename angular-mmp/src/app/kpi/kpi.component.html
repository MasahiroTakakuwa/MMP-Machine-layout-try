<p-toast position="top-right" key="test" appendTo="body"></p-toast>

<p-fluid class="grid grid-cols-12 gap-8 px-4">
    <div class="col-span-12 xl:col-span-12">
        <div class="card">
            <div class="p-formgroup-inline flex flex-wrap gap-3 align-items-center">
                <div class="flex align-items-center gap-2">
                    <div class="font-semibold text-2xl">工場選択</div>
                    <p-selectbutton [(ngModel)]="selectButtonValue" [options]="selectButtonValues" optionLabel="name"
                    (onChange)="onFactoryChange($event)" />
                </div>
                <div class="flex align-items-center gap-2">
                    <div class="font-semibold text-2xl">加工切替</div>
                    <p-togglebutton [(ngModel)]="toggleValue" [disabled]="toggleDisabled" onLabel="切削" offLabel="鍛造" [style]="{ width: '10em' }"
                    (onChange)="onToggleChange()" />
                </div>
                
                <div class="flex align-items-center gap-2">
                    <div class="font-semibold text-2xl">品番</div>
                    <p-dropdown [(ngModel)]="dropdownValue" [options]="dropdownValues" optionLabel="name" placeholder="Select"
                    (onChange)="onPartsNoSelect()" />                    
                </div>
                <div class="flex align-items-center gap-2">
                    <div class="font-semibold text-2xl">設備</div>
                    <p-dropdown [(ngModel)]="dropdown2Value" [options]="dropdown2Values" optionLabel="name" placeholder="Select" />
                </div>

                <div class="flex align-items-center gap-2">
                    <p-button label="KPIデータ表示" (onClick)="displayCharts()"></p-button>
                </div>
           </div>
        </div>
    </div>
            <!-- テスト用 -->
    <div class="col-span-12 xl:col-span-12">
        <div class="card">
            <!-- ここまで -->
            <div class="font-semibold text-2xl mb-2">生産実績</div>
            <p-chart type="bar" [data]="ProdChartData" [options]="ProdChartOptions" style="height: 550px;"></p-chart>
        </div>
    </div>

    <div class="col-span-12 xl:col-span-12">
        <div class="card">        
            <div class="font-semibold text-2xl mb-2">可動率</div>
            <p-chart type="bar" [data]="OperatingRateData" [options]="OperatingRateOptions" style="height: 550px;"></p-chart>
        </div>
    </div>

    <div class="col-span-12 xl:col-span-12">
        <div class="card">        
            <div class="font-semibold text-2xl mb-2">不良率</div>
            <p-chart type="bar" [data]="DefectRateData" [options]="DefectRateOptions" style="height: 550px;"></p-chart>
        </div>
    </div>
</p-fluid>
