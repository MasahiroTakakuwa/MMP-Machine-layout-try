
<!-- ==============================================================================
src/app/tierra/tierra.component.html
📄 tierra.component.html - 🇻🇳 Giao diện hiển thị sơ đồ máy của nhà máy tierra
                          🇯🇵 tierra工場の機械レイアウトを表示するテンプレート

✅ 🇻🇳 File này hiển thị:
    • Sơ đồ SVG nền của nhà máy tierra
    • Các máy trên layout theo tọa độ lấy từ API
    • Đèn trạng thái cho máy thường (type ≠ 40)
    • Hình ellipse thể hiện hiệu suất cho máy loại 40
    • Tùy chọn bật/tắt chế độ chỉnh sửa vị trí (Edit mode)
    • Hiển thị lưới hỗ trợ di chuyển máy khi ở Edit mode

✅ 🇯🇵 このファイルでは以下の内容を表示します：
    • tierra工場の背景SVGレイアウト
    • APIから取得した位置に機械を表示
    • 通常機械（type ≠ 40）の状態ライトを描画
    • タイプ40機械のパフォーマンスを楕円で表現
    • 位置編集モードのON/OFF切替
    • 編集モード時に表示されるグリッド線
=============================================================================== -->
<p-fluid class="grid grid-cols-12 gap-2">
        <!-- 12分割してそのうち3列分を取得 -->
        <div class="col-span-12 xl:col-span-1 flex-col h-full">
            <!-- tableを配置(稼働台数などを表示) -->       
            <p-table 
                [value]="items"
                [columns]="columns"
                [autoLayout]="true"
                class="p-datatable-sm flex-grow"
                [style]=" {height: '100%'} "
                >
            <!-- <ng-template pTemplate="header" let-columns>
                <tr>
                <th *ngFor="let col of columns" [ngClass]="col.styleClass">{{ col.header }}</th>
                </tr>
            </ng-template> -->
            <ng-template pTemplate="body" let-rowData let-columns="columns">
                <tr>
                <td *ngFor="let col of columns" [ngClass]="col.styleClass">{{ rowData[col.field] }}</td>
                </tr>
            </ng-template>
            </p-table>

        </div>
        <div class="col-span-12 xl:col-span-11">
        <!-- 工場レイアウトを貼り付け -->
        <!-- Layout tierra -->
        <div class="relative w-full h-full bg-gray-0 overflow-y-hidden">

          <!-- ✅ 🇻🇳 Nền là ảnh SVG hiển thị sơ đồ nhà máy
                  🇯🇵 工場レイアウトの背景としてSVG画像を使用 -->
          
          <div class="flex justify-between items-center mb-1">
            <h1 class="text-lg font-bold mb-0">🏭 Tierra Layout</h1>

            <!-- Hiển thị phần trăm Zoom -->
            <!-- ズーム倍率の表示 -->
            <div class="text-sm text-gray-600">
              Zoom: {{ (zoom * 100) | number:'1.0-0' }}%
              <span class="ml-2 text-xs text-gray-400">
                (Ctrl + scroll)
                <!-- Ctrlキーを押しながらマウスホイールを回す -->
              </span>
            </div>

            <!-- 🇻🇳 Cho phép bật/tắt chế độ chỉnh sửa vị trí máy
                🇯🇵 機械の位置を編集できるモードのON/OFF切替 -->
            <div class="flex items-center justify-end mb-2">
              <label class="flex items-center cursor-pointer">
                <input
                  type="checkbox"
                  class="form-checkbox w-5 h-5 text-blue-600"
                  [(ngModel)]="editMode"
                />
                <span class="ml-2 font-semibold text-sm">Edit mode</span>
              </label>
            </div>

          </div>
          <!-- 設備状態と稼働率の凡例表示 -->
          <div class="w-full h-full overflow-auto" style="position: relative;z-index: 1;">
                <div style="position: absolute; top: 0; left: 0;z-index: 2;" class="ml-5 mt-5">
                <h6>設備状態(Tierra)</h6>
                <div class="flex gap-1 mb-1">
                    <div class="font-semibold text-4xl">
                        生産進捗：
                    </div>
                    <div class="font-semibold text-4xl judge"
                        [class.ok]="judge === '〇'"
                        [class.ng]="judge === '✖'">
                        {{ judge || '-' }}({{ (delta != null ? (delta | number:'1.0-0') : '-') }})
                    </div>
                </div>

                <div class="flex gap-1 mb-1">
                    <span style="font-size: 28px;">数字：製品別ラインNo.</span>
                </div>
                <p></p>
                <div class="flex gap-2 mb-2">
                    <span style="background-color: #4f6fff;padding: 16px;"></span>
                    <span style="font-size: 28px;">稼働中(目標以上)</span>
                </div>
                <div class="flex gap-2 mb-2">
                    <span style="background-color: #84ff00ff;padding: 16px;"></span>
                    <span style="font-size: 28px;">稼働中(目標未満)</span>
                </div>
                <div class="flex gap-2 mb-2">
                    <span style="background-color: #ff8080;padding: 16px;"></span>
                    <span style="font-size: 28px;">停止中</span>
                </div>
                <div class="flex gap-2 mb-2">
                    <span style="background-color: #ff0000ff;padding: 16px;"></span>
                    <span style="font-size: 28px;">4h以上停止中</span>
                </div>
                <div class="flex gap-2 mb-2">
                    <span style="background-color: #ccc;padding: 16px;"></span>
                    <span style="font-size: 28px;">計画停止中</span>
                </div>
                
            </div>

            <svg
              viewBox="0 0 3840 2400"
              preserveAspectRatio="xMidYMid meet"
              class="w-full h-full"
              xmlns="http://www.w3.org/2000/svg"
              (click)="onSvgClick($event)"
              (wheel)="onWheel($event)"
              (mousedown)="onMouseDown($event)"
              (mousemove)="onMouseMove($event)"
              (mouseup)="onMouseUp($event)"
              (contextmenu)="$event.preventDefault()"
              [attr.style]="'transform: translate(' + panX + 'px, ' + panY + 'px) scale(' + zoom + '); transform-origin: 0 0;'"
            >

              <!-- 🇻🇳 DÁN TOÀN BỘ NỘI DUNG CỦA tierra-layout.svg VÀO ĐÂY
                  🇯🇵 tierra-layout.svg の中身をここに貼り付けてください -->

8" fill="none" fill-rule="evenodd" transform="matrix(-1 0 0 1 2314.76 1767.5)"/><path d="M0 0 51.2569 71.2259" stroke="#000000" stroke-width="10.6667" stroke-miterlimit="8" fill="none" fill-rule="evenodd" transform="matrix(-1 0 0 1 2098.76 1925.5)"/><path d="M0 0 51.2569 71.2259" stroke="#000000" stroke-width="10.6667" stroke-miterlimit="8" fill="none" fill-rule="evenodd" transform="matrix(-1 0 0 1 2223.76 1991.5)"/><path d="M0 0 51.2569 71.2259" stroke="#000000" stroke-width="10.6667" stroke-miterlimit="8" fill="none" fill-rule="evenodd" transform="matrix(-1 0 0 1 1694.76 1027.5)"/><path d="M0 0 51.2569 71.2259" stroke="#000000" stroke-width="10.6667" stroke-miterlimit="8" fill="none" fill-rule="evenodd" transform="matrix(-1 0 0 1 1725.76 1134.5)"/><path d="M0 0 51.2569 71.2259" stroke="#000000" stroke-width="10.6667" stroke-miterlimit="8" fill="none" fill-rule="evenodd" transform="matrix(-1 0 0 1 1185.76 1422.5)"/><path d="M0 0 51.2569 71.2259" stroke="#000000" stroke-width="10.6667" stroke-miterlimit="8" fill="none" fill-rule="evenodd" transform="matrix(-1 0 0 1 1037.76 1351.5)"/><path d="M0 0 51.2569 71.2259" stroke="#000000" stroke-width="10.6667" stroke-miterlimit="8" fill="none" fill-rule="evenodd" transform="matrix(-1 0 0 1 921.757 1253.5)"/><path d="M0 0 51.2569 71.2259" stroke="#000000" stroke-width="10.6667" stroke-miterlimit="8" fill="none" fill-rule="evenodd" transform="matrix(-1 0 0 1 1434.76 909.5)"/><path d="M0 0 51.2569 71.2259" stroke="#000000" stroke-width="10.6667" stroke-miterlimit="8" fill="none" fill-rule="evenodd" transform="matrix(-1 0 0 1 1299.76 857.5)"/><path d="M0 0 51.2569 71.2259" stroke="#000000" stroke-width="10.6667" stroke-miterlimit="8" fill="none" fill-rule="evenodd" transform="matrix(-1 0 0 1 863.757 1120.5)"/><path d="M0 0 51.2569 71.2259" stroke="#000000" stroke-width="10.6667" stroke-miterlimit="8" fill="none" fill-rule="evenodd" transform="matrix(-1 0 0 1 1037.76 680.5)"/><path d="M0 0 51.2569 71.2259" stroke="#000000" stroke-width="10.6667" stroke-miterlimit="8" fill="none" fill-rule="evenodd" transform="matrix(-1 0 0 1 811.757 821.5)"/><path d="M0 0 51.2569 71.2259" stroke="#000000" stroke-width="10.6667" stroke-miterlimit="8" fill="none" fill-rule="evenodd" transform="matrix(-1 0 0 1 447.757 991.5)"/><path d="M0 0 79.5858 34.1461" stroke="#000000" stroke-width="10.6667" stroke-miterlimit="8" fill="none" fill-rule="evenodd" transform="matrix(-1 0 0 1 1328.09 1199.5)"/><path d="M0 0 128.22 25.6276" stroke="#000000" stroke-width="10.6667" stroke-miterlimit="8" fill="none" fill-rule="evenodd" transform="matrix(-1 0 0 1 2732.72 1108.5)"/><path d="M0 0 4.66782 62.8277" stroke="#000000" stroke-width="10.6667" stroke-miterlimit="8" fill="none" fill-rule="evenodd" transform="matrix(-1 0 0 1 2527.17 928.5)"/><path d="M0 0 4.66782 62.8277" stroke="#000000" stroke-width="10.6667" stroke-miterlimit="8" fill="none" fill-rule="evenodd" transform="matrix(-1 0 0 1 2024.17 802.5)"/><path d="M0 0 4.66782 62.8277" stroke="#000000" stroke-width="10.6667" stroke-miterlimit="8" fill="none" fill-rule="evenodd" transform="matrix(-1 0 0 1 1746.17 621.5)"/></g>
                    <!-- 🧱 🇻🇳 Hiển thị máy không phải loại 40: mô phỏng đèn tháp
                      🇯🇵 タイプ40以外の機械：タワーライトとして描画 -->
                  <g *ngFor="let machine of machinesTypeNot40">
                    <!-- 🇻🇳 Khối chữ nhật đứng nền trắng: thân đèn tháp
                    🇯🇵 白い縦長の長方形：タワーライトの本体 -->
                    <!-- <rect
                      [attr.x]="machine.x + 50"
                      [attr.y]="machine.y - 30"
                      width="40"
                      height="80"
                      fill="white"
                      stroke="black"
                      stroke-width="2"
                      rx="15"
                    /> -->

                    <!-- 🇻🇳 Chấm tròn đại diện bóng đèn màu theo trạng thái
                    🇯🇵 状態に応じた色付きの丸：タワーライト上部 -->
                    <!-- <circle
                      [attr.cx]="machine.x + 70"
                      [attr.cy]="machine.y - 0"
                      r="15"
                      [attr.fill]="getStatusColor(machine.status)"
                      stroke="black"
                      stroke-width="1"
                    /> -->
                  </g>

                  <!-- 💡 🇻🇳 Hiển thị máy loại 40 bằng hình elip: thể hiện hiệu suất
                      🇯🇵 タイプ40の機械は楕円で描画し、パフォーマンスを色で表現 -->
                  <g *ngFor="let machine of machinesType40">
                        <!-- There is tooltip to show information of schedule stop machine -->
                        <!-- If there is schedule stop machine, the ellipse will filled by grey color -->
                        <!-- There is click event to show dialog input schedule stop machine -->
                        <!-- user có quyền số 11 có thể click mở dialog-->
                        <ellipse [pTooltip]="'ライン番号: ' + machine.line_no +
                                            '\n品番: ' + machine.parts_name +
                                            '\n設備停止\nFrom date: ' + machine.schedule_stop_machine?.date_start + 
                                            '\nTo date: ' + machine.schedule_stop_machine?.date_end + 
                                            '\nShift: ' + machine.schedule_stop_machine?.shift + 
                                            '\nReason: ' + machine.schedule_stop_machine?.content"
                        [tooltipDisabled]="false"
                        [tooltipStyleClass]="'custom-tooltip'" 
                        [attr.cx]="machine.x + 65"
                        [attr.cy]="machine.y + 15"
                        [attr.fill]="machine.schedule_stop_machine?'#ccc':getPerformanceColor(machine.status)"
                        class="machine-ellipse"
                        (click)="userPermissions.includes(11)&&inputDowntime(machine)"
                        />
                        <text [pTooltip]="'ライン番号: ' + machine.line_no +
                                            '\n品番: ' + machine.parts_name +
                                            '\n設備停止\nFrom date: ' + machine.schedule_stop_machine?.date_start + 
                                            '\nTo date: ' + machine.schedule_stop_machine?.date_end + 
                                            '\nShift: ' + machine.schedule_stop_machine?.shift + 
                                            '\nReason: ' + machine.schedule_stop_machine?.content"
                        [tooltipDisabled]="false"
                        [tooltipStyleClass]="'custom-tooltip'" 
                        [attr.x]="machine.x + 65"
                        [attr.y]="machine.y + 35"
                        class="performance-text"
                        text-anchor="middle"
                        (click)="userPermissions.includes(11)&&inputDowntime(machine)"
                        >
                        <!-- {{ machine.schedule_stop_machine? 'Stop':((machine.performance ?? 0) * 100 | number:'1.1-1' )}} -->
                        <!-- {{ machine.schedule_stop_machine? 'Stop':Math.floor((machine.performance ?? 0) * 100)}} -->
                        {{ machine.schedule_stop_machine? 'Stop':machine.line_no ?? 0}}
                      </text>
                    </g>

                  <!-- 🧱 Grid view for Edit Mode -->
                  <g *ngIf="editMode">
                    <ng-container *ngFor="let x of gridX">
                      <line
                        [attr.x1]="x"
                        y1="0"
                        [attr.x2]="x"
                        [attr.y2]="svgHeight"
                        stroke="#cccccc"
                        stroke-width="1"
                      />
                    </ng-container>

                    <ng-container *ngFor="let y of gridY">
                      <line
                        x1="0"
                        [attr.y1]="y"
                        [attr.x2]="svgWidth"
                        [attr.y2]="y"
                        stroke="#cccccc"
                        stroke-width="1"
                      />
                    </ng-container>
                  </g>
              </svg>
            </svg>
          </div>
          </div>
        </div>
    </p-fluid>
<p-toast />
